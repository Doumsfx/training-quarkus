quarkus.swagger-ui.enable=true
quarkus.swagger-ui.title=First API
quarkus.swagger-ui.version=1.0.0
quarkus.smallrye-openapi.info-title=First API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=A sample Quarkus Application

# Keycloak OIDC Configuration
quarkus.oidc.auth-server-url=http://localhost:8180/realms/vsafe-next
quarkus.oidc.client-id=vsafe-web-app
quarkus.oidc.credentials.secret=ARRs6m9ApDr10y5koWDR7tALgMcsWOwG
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.cookie-path=/
quarkus.oidc.authentication.cookie-same-site=lax
quarkus.oidc.token.principal-claim=preferred_username
quarkus.oidc.logout.path=/auth/logout
quarkus.oidc.logout.post-logout-path=/auth/post-logout

# API (Postman) - Bearer token endpoints
# Requests targeting /api/* will be secured as a service application (no redirects, 401/403 JSON-friendly).
quarkus.oidc.api.auth-server-url=http://localhost:8180/realms/vsafe-next
quarkus.oidc.api.application-type=service
quarkus.oidc.api.tenant-paths=/api/*
quarkus.oidc.api.token.principal-claim=preferred_username
quarkus.oidc.api.roles.role-claim-path=realm_access/roles

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:8080
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=content-type,authorization
quarkus.http.cors.exposed-headers=content-type,authorization
quarkus.http.cors.access-control-allow-credentials=true

# Keycloak Admin API
quarkus.rest-client.keycloak-admin.url=http://localhost:8180

# Keycloak Admin (service account) utiliser pour appeler l'Admin API
# Cree un client Keycloak confidentiel avec "Service accounts" active,
# puis donne lui un role realm-management (ex: view-users/query-users) sur le realm.
vsafe.keycloak.realm=vsafe-next
vsafe.keycloak.admin.client-id=vsafe-admin-service
vsafe.keycloak.admin.client-secret=1reeOncglRilKYutBm5pcGHl1N8OVLC6
